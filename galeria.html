  <meta name="theme-color" content="#2c3a30">
  <link rel="icon" href="assets/app-icon-32.png">
  <link rel="apple-touch-icon" href="assets/app-icon-192.png">

<a href="#main" class="skip-link">Saltar al contenido principal</a>

<div id="hdr"></div>

<main id="main">
  <span id="top"></span>

  <section class="page-hero page-hero--image" style="--bg:url('assets/Amanecer (1).JPG')">
    <div class="container">
      <span class="eyebrow"><i class="fa-solid fa-images" aria-hidden="true"></i> El Monasterio</span>
      <h1>Galería del Monasterio</h1>
      <nav class="crumbs" aria-label="Migas de pan">
        <a href="index.html">Inicio</a><i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
        <span>El Monasterio</span><i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
        <span class="current">Galería</span>
      </nav>
    </div>
  </section>

  <section class="page-body">
    <div class="container">
      <div class="gallery reveal">
        <figure class="gallery-main">
          <img id="galleryMain" src="assets/Frente (1).JPG" alt="Vista destacada del monasterio">
        </figure>
        <div class="gallery-grid" id="galleryGrid">
          <img src="assets/Frente (1).JPG" alt="Frente 1">
          <img src="assets/Frente (4).JPG" alt="Frente 4">
          <img src="assets/Frente (5).JPG" alt="Frente 5">
          <img src="assets/Frente (6).JPG" alt="Frente 6">
          <img src="assets/Frente (7).JPG" alt="Frente 7">
          <img src="assets/Frente (8).JPG" alt="Frente 8">
          <img src="assets/Amanecer (1).JPG" alt="Amanecer 1">
          <img src="assets/Amanecer (2).JPG" alt="Amanecer 2">
          <img src="assets/Amanecer (3).JPG" alt="Amanecer 3">
          <img src="assets/Amanecer (4).JPG" alt="Amanecer 4">
          <img src="assets/Cementerio.JPG" alt="Cementerio">
          <img src="assets/Claustro (1).JPG" alt="Claustro 1">
          <img src="assets/Claustro (4).JPG" alt="Claustro 4">
          <img src="assets/Claustro (5).JPG" alt="Claustro 5">
          <img src="assets/Colmenar (1).JPG" alt="Colmenar 1">
          <img src="assets/Colmenar (2).JPG" alt="Colmenar 2">
          <img src="assets/DesdeElCerroElBalcon (1).JPG" alt="Vista desde el cerro 1">
          <img src="assets/DesdeElCerroElBalcon (2).JPG" alt="Vista desde el cerro 2">
          <img src="assets/DesdePeriquillo (1).JPG" alt="Desde Periquillo 1">
          <img src="assets/DesdePeriquillo (4).JPG" alt="Desde Periquillo 4">
          <img src="assets/posterior (1).JPG" alt="Parte posterior 1">
          <img src="assets/posterior (2).JPG" alt="Parte posterior 2">
          <img src="assets/posterior (3).JPG" alt="Parte posterior 3">
          <img src="assets/posterior (4).JPG" alt="Parte posterior 4">
          <img src="assets/GrutaVirgen (1).JPG" alt="Gruta Virgen 1">
          <img src="assets/GrutaVirgen (2).JPG" alt="Gruta Virgen 2">
          <img src="assets/Sanjoseyelniño (2).JPG" alt="San José y el Niño">
          <img src="assets/Vista interna (1).JPG" alt="Vista interna 1">

          <img src="assets/Vista interna (3).JPG" alt="Vista interna 3">
